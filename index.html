<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Operator Training Engine</title>
  <!-- Tailwind CSS Engine CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React and ReactDOM Production Engines -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Lucide Icons for clean UI utility -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* Prevent mobile webkit scrolling rubber-banding inside structural components */
    body { -webkit-tap-highlight-color: transparent; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="h-full flex flex-col antialiased selection:bg-lime-500 selection:text-slate-900">

  <div id="root" class="h-full flex flex-col overflow-hidden max-w-md mx-auto w-full border-x border-slate-900 bg-slate-950"></div>

  <script>
    const e = React.createElement;
    const { useState, useEffect, useRef } = React;

    // ─── MULTI-PHASE PROGRAM BLOCK DEFINITION ──────────────────────────────────
    const PROGRAM_PHASES = {
      strength_accumulation: {
        name: "Winter Strength Accumulation",
        mon: {
          id: "mon", label: "Monday", name: "Lower Strength", focus: "Squat · RDL",
          exercises: [
            { id: "squat", name: "Barbell Squat", sets: 4, reps: "5", prescription: "4×5", note: "Heavy strength base." },
            { id: "rdl", name: "Romanian Deadlift", sets: 3, reps: "8", prescription: "3×8", note: "Control eccentric phase." }
          ]
        },
        tue: {
          id: "tue", label: "Tuesday", name: "Upper Push", focus: "Bench · OHP",
          exercises: [
            { id: "bench", name: "Barbell Bench Press", sets: 4, reps: "5", prescription: "4×5", note: "Power output focus." },
            { id: "ohp", name: "Overhead Press", sets: 3, reps: "8", prescription: "3×8", note: "Manage shoulder load carefully." }
          ]
        },
        wed: { id: "wed", label: "Wednesday", name: "Active Recovery", conditioning: true, exercises: [] },
        thu: {
          id: "thu", label: "Thursday", name: "Lower Athletic Focus", focus: "Trap Bar · Splits",
          exercises: [
            { id: "trapbar", name: "Trap Bar Deadlift", sets: 4, reps: "6", prescription: "4×6", note: "Explosive triple extension pull." }
          ]
        },
        fri: {
          id: "fri", label: "Friday", name: "Upper Pull Density", focus: "Pull-ups · Rows",
          exercises: [
            { id: "pullup", name: "Weighted Pull-Up", sets: 4, reps: "6", prescription: "4×6" },
            { id: "row", name: "Barbell Row", sets: 3, reps: "8", prescription: "3×8" }
          ]
        },
        sat: { id: "sat", label: "Saturday", name: "Aerobic Capacity (Zone 2)", conditioning: true, exercises: [] }
      },

      summer_hybrid: {
        name: "Summer Hybrid (Engine & Capacity)",
        mon: {
          id: "mon", label: "Monday", name: "Lower Work Capacity", focus: "High Rep Squat · Volume",
          exercises: [
            { id: "squat", name: "Barbell Squat", sets: 3, reps: "10", prescription: "3×10", note: "Lighter structural load, metabolic stress." },
            { id: "stepdown", name: "Patrick Step Down", sets: 3, reps: "20 ea", prescription: "3×20", note: "Knee resilience and tracking focus." }
          ]
        },
        tue: { id: "tue", label: "Tuesday", name: "Running: Track Intervals", conditioning: true, exercises: [] },
        wed: {
          id: "wed", label: "Wednesday", name: "Upper Local Endurance", focus: "Bodyweight Modifiers",
          exercises: [
            { id: "pushup", name: "Deficit Push-Up", sets: 4, reps: "15", prescription: "4×15" },
            { id: "pullup", name: "Bodyweight Pull-Up", sets: 4, reps: "Max", prescription: "4×Max" }
          ]
        },
        thu: { id: "thu", label: "Thursday", name: "Running: Tempo Work", conditioning: true, exercises: [] },
        fri: {
          id: "fri", label: "Friday", name: "Full Body Armor Structural", focus: "Hinge & Carry",
          exercises: [
            { id: "trapbar", name: "Trap Bar Deadlift", sets: 3, reps: "8", prescription: "3×8", note: "Sub-maximal explosive speed pulls." }
          ]
        },
        sat: { id: "sat", label: "Saturday", name: "Acreage / Long Trail Run", conditioning: true, exercises: [] }
      }
    };

    // ─── LOCAL STORAGE WRAPPER UTILITIES ──────────────────────────────────────
    const storage = {
      get: (key) => { try { return JSON.parse(localStorage.getItem(key)); } catch(e) { return null; } },
      set: (key, val) => { localStorage.setItem(key, JSON.stringify(val)); },
      allKeys: () => Object.keys(localStorage)
    };

    // Helper to extract date strings securely
    const getTodayStr = () => new Date().toISOString().split('T')[0];

    // ─── MASTER ROOT COMPONENT ────────────────────────────────────────────────
    function App() {
      const [activeTab, setActiveTab] = useState("train"); // train, history, analytics
      const [activePhase, setActivePhase] = useState(() => storage.get("jt_active_phase") || "strength_accumulation");
      const [selectedDay, setSelectedDay] = useState("mon");
      const [workoutLogs, setWorkoutLogs] = useState([]);
      
      // Live session engine tracking workspace
      const [liveExercises, setLiveExercises] = useState([]);
      const [sessionActive, setSessionActive] = useState(false);
      const [conditioningNotes, setConditioningNotes] = useState("");

      const currentProgram = PROGRAM_PHASES[activePhase] || PROGRAM_PHASES.strength_accumulation;
      const currentDayData = currentProgram[selectedDay];

      // Refresh data layers from local storage
      const loadLogsFromStorage = () => {
        const keys = storage.allKeys();
        const logs = keys
          .filter(k => k.startsWith("workout:"))
          .map(k => {
            const parts = k.split(":");
            return {
              key: k,
              dayId: parts[1],
              date: parts[2],
              timestamp: parseInt(parts[3] || "0"),
              data: storage.get(k)
            };
          })
          .sort((a, b) => b.timestamp - a.timestamp);
        setWorkoutLogs(logs);
      };

      useEffect(() => {
        loadLogsFromStorage();
      }, []);

      // Re-initialize live track array whenever day or active deployment configuration updates
      useEffect(() => {
        if (!sessionActive && currentDayData) {
          if (currentDayData.conditioning) {
            setLiveExercises([]);
            setConditioningNotes("");
          } else {
            const prepared = currentDayData.exercises.map(ex => ({
              ...ex,
              setsData: Array.from({ length: ex.sets }, () => ({ weight: "", reps: ex.reps, checked: false }))
            }));
            setLiveExercises(prepared);
          }
        }
      }, [selectedDay, activePhase, sessionActive]);

      const handleStartSession = () => {
        setSessionActive(true);
      };

      const handleCancelSession = () => {
        if(confirm("Discard current training session mutations?")) {
          setSessionActive(false);
          // Force execution layout rebuild
          const prepared = currentDayData.exercises.map(ex => ({
            ...ex,
            setsData: Array.from({ length: ex.sets }, () => ({ weight: "", reps: ex.reps, checked: false }))
          }));
          setLiveExercises(prepared);
          setConditioningNotes("");
        }
      };

      // Real-time structural swap updates (Modifying the lift text names or targets)
      const updateExerciseMeta = (index, property, value) => {
        const updated = [...liveExercises];
        updated[index][property] = value;
        setLiveExercises(updated);
      };

      const updateSetDataValue = (exIndex, setIndex, field, value) => {
        const updated = [...liveExercises];
        updated[exIndex].setsData[setIndex][field] = value;
        setLiveExercises(updated);
      };

      const toggleSetCheckedState = (exIndex, setIndex) => {
        const updated = [...liveExercises];
        const currentSet = updated[exIndex].setsData[setIndex];
        currentSet.checked = !currentSet.checked;
        setLiveExercises(updated);
      };

      const handleCommitWorkout = () => {
        const timestamp = Date.now();
        const dateStr = getTodayStr();
        const storageKey = `workout:${selectedDay}:${dateStr}:${timestamp}`;
        
        const logPayload = {
          phaseKey: activePhase,
          phaseName: currentProgram.name,
          dayLabel: currentDayData.label,
          dayName: currentDayData.name,
          isConditioning: !!currentDayData.conditioning,
          exercises: liveExercises,
          conditioningNotes: conditioningNotes
        };

        storage.set(storageKey, logPayload);
        setSessionActive(false);
        loadLogsFromStorage();
        alert("Session locked into device sandbox storage.");
      };

      return e("div", { class: "h-full flex flex-col justify-between overflow-hidden relative" },
        // Top Primary Branding Header
        e("header", { class: "bg-slate-900 border-b border-slate-800 p-4 shrink-0 flex items-center justify-between" },
          e("div", null,
            e("h1", { class: "text-md font-bold tracking-tight text-lime-400" }, "OPERATOR ENGINE"),
            e("p", { class: "text-xs text-slate-400 font-mono" }, "v2.0.0 // LOCAL-SANDBOXED")
          ),
          sessionActive && e("div", { class: "bg-red-950/40 border border-red-800/60 text-red-400 text-[10px] px-2 py-1 rounded uppercase tracking-widest font-bold animate-pulse" }, "LIVE SESSION")
        ),

        // Primary Scrollable Body Container
        e("main", { class: "flex-1 overflow-y-auto p-4 no-scrollbar space-y-4" },
          activeTab === "train" && e(TrainTab, {
            activePhase, setActivePhase, selectedDay, setSelectedDay, currentProgram, currentDayData,
            sessionActive, handleStartSession, handleCancelSession, handleCommitWorkout,
            liveExercises, updateExerciseMeta, updateSetDataValue, toggleSetCheckedState,
            conditioningNotes, setConditioningNotes
          }),
          activeTab === "history" && e(HistoryTab, { workoutLogs, loadLogsFromStorage }),
          activeTab === "analytics" && e(AnalyticsTab, { workoutLogs })
        ),

        // Bottom Application Form Factor Navigation Hub
        e("nav", { class: "bg-slate-900 border-t border-slate-800 h-16 shrink-0 grid grid-cols-3 text-center" },
          [
            { id: "train", label: "TRAIN", icon: "dumbbell" },
            { id: "history", label: "LOGS", icon: "history" },
            { id: "analytics", label: "METRICS", icon: "line-chart" }
          ].map(btn => {
            const isActive = activeTab === btn.id;
            return e("button", {
              key: btn.id,
              onClick: () => !sessionActive ? setActiveTab(btn.id) : alert("Commit or cancel active deployment session before navigating."),
              class: `flex flex-col items-center justify-center space-y-1 font-bold tracking-wider text-xs border-t-2 transition-all ${isActive ? "text-lime-400 border-lime-400 bg-slate-950/40" : "text-slate-500 border-transparent hover:text-slate-300"}`
            }, btn.label);
          })
        )
      );
    }

    // ─── MODULE TAB 1: LOGICAL TRAINING CONTROL ──────────────────────────────
    function TrainTab({
      activePhase, setActivePhase, selectedDay, setSelectedDay, currentProgram, currentDayData,
      sessionActive, handleStartSession, handleCancelSession, handleCommitWorkout,
      liveExercises, updateExerciseMeta, updateSetDataValue, toggleSetCheckedState,
      conditioningNotes, setConditioningNotes
    }) {
      return e("div", { class: "space-y-4 pb-6" },
        
        // Block deployment phase config switcher selector
        !sessionActive && e("div", { class: "bg-slate-900/60 border border-slate-900 rounded-xl p-3" },
          e("label", { class: "block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5" }, "Active Deployment Block Strategy"),
          e("select", {
            value: activePhase,
            onChange: (e) => {
              storage.set("jt_active_phase", e.target.value);
              setActivePhase(e.target.value);
            },
            class: "w-full bg-slate-950 border border-slate-800 rounded-lg p-2 text-xs font-mono font-bold text-slate-200 outline-none focus:border-lime-500"
          },
            Object.entries(PROGRAM_PHASES).map(([k, v]) => e("option", { key: k, value: k }, v.name))
          )
        ),

        // Horizon view weekly calendar tracking selector strips
        e("div", { class: "flex gap-1 overflow-x-auto no-scrollbar" },
          ["mon", "tue", "wed", "thu", "fri", "sat"].map(dayKey => {
            const d = currentProgram[dayKey];
            const isSelected = selectedDay === dayKey;
            return e("button", {
              key: dayKey,
              disabled: sessionActive,
              onClick: () => setSelectedDay(dayKey),
              class: `flex-1 min-w-[58px] p-2 text-center border rounded-xl transition-all flex flex-col items-center ${isSelected ? "bg-lime-500/10 border-lime-500 text-lime-400 font-bold" : "bg-slate-900/40 border-slate-900 text-slate-400"} ${sessionActive ? "opacity-40" : "hover:border-slate-700"}`
            },
              e("span", { class: "text-[10px] uppercase tracking-wider block" }, d.label.substring(0,3)),
              e("span", { class: "text-xs font-bold font-mono mt-0.5" }, d.conditioning ? "Z2/ENG" : "LIFT")
            );
          })
        ),

        // Session metadata visualization board
        e("div", { class: "bg-slate-900 border border-slate-800 rounded-xl p-4 space-y-1" },
          e("div", { class: "text-[10px] font-bold text-lime-400 uppercase tracking-widest font-mono" }, currentDayData.focus || "ENGINE CAPACITY / CONDITIONING METRIC"),
          e("h2", { class: "text-lg font-bold text-slate-100 tracking-tight" }, currentDayData.name),
          e("p", { class: "text-xs text-slate-400" }, currentProgram.name)
        ),

        // Main action triggers (Start, Commit, Cancel buttons)
        e("div", null,
          !sessionActive 
            ? e("button", { onClick: handleStartSession, class: "w-full bg-lime-500 hover:bg-lime-400 text-slate-950 text-xs font-bold py-3.5 px-4 rounded-xl tracking-widest transition-all" }, "INITIALIZE DEPLOYMENT SESSION")
            : e("div", { class: "grid grid-cols-2 gap-2" },
                e("button", { onClick: handleCancelSession, class: "bg-slate-900 border border-slate-800 hover:bg-slate-800 text-slate-400 text-xs font-bold py-3 rounded-xl tracking-wider" }, "DISCARD"),
                e("button", { onClick: handleCommitWorkout, class: "bg-lime-500 hover:bg-lime-400 text-slate-950 text-xs font-bold py-3 rounded-xl tracking-wider" }, "LOCK & COMMIT LOG")
              )
        ),

        // Exercises flight engine render array
        currentDayData.conditioning 
          ? e("div", { class: "bg-slate-900 border border-slate-800 rounded-xl p-4 space-y-3" },
              e("h3", { class: "text-xs font-bold text-slate-300 tracking-wider font-mono uppercase" }, "Session Conditioning Tracker Output"),
              e("textarea", {
                disabled: !sessionActive,
                value: conditioningNotes,
                onChange: (e) => setConditioningNotes(e.target.value),
                placeholder: sessionActive ? "Log metric targets here (e.g., 45 min Zone 2 run, 5.2 miles, average heart rate 142 bpm)..." : "Initialize deployment to access note input fields.",
                class: "w-full h-32 bg-slate-950 border border-slate-800 rounded-lg p-3 text-xs font-mono text-slate-200 outline-none focus:border-lime-500 disabled:opacity-50 resize-none"
              })
            )
          : e("div", { class: "space-y-3" },
              liveExercises.map((ex, exIdx) => e(ExerciseCard, {
                key: ex.id || exIdx,
                ex,
                exIdx,
                sessionActive,
                updateExerciseMeta,
                updateSetDataValue,
                toggleSetCheckedState
              }))
            )
      );
    }

    // ─── SUB-COMPONENT: EXERCISE EDITABLE FLIGHT CARD ───────────────────────
    function ExerciseCard({ ex, exIdx, sessionActive, updateExerciseMeta, updateSetDataValue, toggleSetCheckedState }) {
      const [isEditing, setIsEditing] = useState(false);

      return e("div", { class: "bg-slate-900 border border-slate-800 rounded-xl overflow-hidden transition-all duration-200" },
        // Header Section of specific lift module
        e("div", { class: "bg-slate-900/80 border-b border-slate-950 p-3 flex items-center justify-between gap-2" },
          isEditing 
            ? e("div", { class: "flex-1 grid grid-cols-2 gap-2" },
                e("input", {
                  value: ex.name,
                  onChange: (e) => updateExerciseMeta(exIdx, "name", e.target.value),
                  placeholder: "Lift Name",
                  class: "bg-slate-950 border border-slate-700 text-xs font-mono text-lime-400 p-1.5 rounded outline-none"
                }),
                e("div", { class: "flex gap-1" },
                  e("input", {
                    value: ex.prescription,
                    onChange: (e) => updateExerciseMeta(exIdx, "prescription", e.target.value),
                    placeholder: "Targets",
                    class: "bg-slate-950 border border-slate-700 text-xs font-mono text-slate-300 p-1.5 rounded w-full outline-none"
                  }),
                  e("button", { onClick: () => setIsEditing(false), class: "bg-lime-500 text-slate-950 text-[10px] font-bold px-2 rounded font-mono" }, "DONE")
                )
              )
            : e("div", { class: "flex-1 min-w-0" },
                e("div", { class: "flex items-center gap-1.5" },
                  e("span", { class: "text-xs font-bold text-slate-200 truncate font-mono" }, ex.name),
                  e("span", { class: "text-[10px] text-slate-500 font-mono" }, `(${ex.prescription})`)
                ),
                ex.note && e("p", { class: "text-[10px] text-slate-400 font-mono mt-0.5 truncate" }, ex.note)
              ),
          
          sessionActive && !isEditing && e("button", {
            onClick: () => setIsEditing(true),
            class: "text-slate-500 hover:text-lime-400 p-1 transition-colors flex items-center shrink-0"
          }, e("span", { class: "text-[10px] font-mono tracking-widest border border-slate-800 bg-slate-950 px-1.5 py-0.5 rounded" }, "SWAP"))
        ),

        // Operational Sets Metric Matrices
        e("div", { class: "p-3 space-y-1.5 bg-slate-950/40" },
          ex.setsData?.map((set, setIdx) => {
            return e("div", { key: setIdx, class: `flex items-center gap-2 text-xs font-mono p-1 rounded transition-colors ${set.checked ? "bg-lime-500/5" : ""}` },
              e("span", { class: `w-5 font-bold text-[10px] text-center ${set.checked ? "text-lime-500" : "text-slate-500"}` }, `S${setIdx + 1}`),
              
              // Load Input Channel
              e("div", { class: "flex-1 flex items-center bg-slate-950 border border-slate-800 rounded-lg overflow-hidden px-2" },
                e("input", {
                  type: "number",
                  pattern: "[0-9]*",
                  disabled: !sessionActive,
                  value: set.weight,
                  onChange: (e) => updateSetDataValue(exIdx, setIdx, "weight", e.target.value),
                  placeholder: "---",
                  class: "w-full bg-transparent text-center text-slate-200 py-1.5 font-bold outline-none disabled:opacity-50 [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
                }),
                e("span", { class: "text-[10px] text-slate-600 font-bold ml-1" }, "LBS")
              ),

              e("span", { class: "text-slate-600 font-bold" }, "×"),

              // Repetition Matrix Input Channel
              e("div", { class: "flex-1 flex items-center bg-slate-950 border border-slate-800 rounded-lg overflow-hidden px-2" },
                e("input", {
                  type: "text",
                  disabled: !sessionActive,
                  value: set.reps,
                  onChange: (e) => updateSetDataValue(exIdx, setIdx, "reps", e.target.value),
                  placeholder: "0",
                  class: "w-full bg-transparent text-center text-slate-200 py-1.5 font-bold outline-none disabled:opacity-50"
                }),
                e("span", { class: "text-[10px] text-slate-600 font-bold ml-1" }, "REPS")
              ),

              // Tactical confirmation checkbox locking variable data state
              e("button", {
                disabled: !sessionActive,
                onClick: () => toggleSetCheckedState(exIdx, setIdx),
                class: `w-8 h-8 rounded-lg border flex items-center justify-center font-bold transition-all ${set.checked ? "bg-lime-500 border-lime-500 text-slate-950" : "bg-slate-950 border-slate-800 text-slate-700"} disabled:opacity-40`
              }, set.checked ? "✓" : "")
            );
          })
        )
      );
    }

    // ─── MODULE TAB 2: HISTORY RECORD ENGINE ────────────────────────────────
    function HistoryTab({ workoutLogs, loadLogsFromStorage }) {
      const handleDeleteRecord = (key) => {
        if(confirm("Permanently strip this workout metric payload from local storage?")) {
          localStorage.removeItem(key);
          loadLogsFromStorage();
        }
      };

      if (workoutLogs.length === 0) {
        return e("div", { class: "text-center py-12 space-y-2" },
          e("p", { class: "text-sm text-slate-500 font-mono" }, "Device local historical database is completely blank."),
          e("p", { class: "text-xs text-slate-600 max-w-xs mx-auto" }, "Completed logs written to browser memory origins will manifest sequentially downstream here.")
        );
      }

      return e("div", { class: "space-y-4 pb-6" },
        e("h3", { class: "text-xs font-bold text-slate-400 tracking-wider uppercase font-mono" }, `Logged Datasets Archive (${workoutLogs.length})`),
        workoutLogs.map(log => {
          const d = log.data;
          return e("div", { key: log.key, class: "bg-slate-900 border border-slate-800 rounded-xl overflow-hidden font-mono text-xs" },
            // Header panel metadata band
            e("div", { class: "bg-slate-900/60 p-3 border-b border-slate-950 flex items-center justify-between" },
              e("div", null,
                e("div", { class: "text-slate-400 text-[10px] font-bold uppercase tracking-wider" }, `${log.date} // ${d.dayLabel || log.dayId}`),
                e("div", { class: "text-slate-200 font-bold font-mono text-sm mt-0.5" }, d.dayName)
              ),
              e("button", {
                onClick: () => handleDeleteRecord(log.key),
                class: "text-slate-600 hover:text-red-400 font-bold text-[10px] uppercase border border-slate-800 bg-slate-950/60 px-2 py-1 rounded"
              }, "DELETE")
            ),

            // Execution internal layout specs summary
            e("div", { class: "p-3 space-y-2 bg-slate-950/20" },
              d.isConditioning 
                ? e("p", { class: "text-slate-300 text-xs leading-relaxed whitespace-pre-wrap font-mono" }, d.conditioningNotes || "Empty engineering execution conditioning logs.")
                : d.exercises?.map((ex, idx) => {
                    const trackedSets = ex.setsData?.filter(s => s.checked) || [];
                    return e("div", { key: idx, class: "border-b border-slate-900/60 pb-1.5 last:border-0 last:pb-0" },
                      e("div", { class: "text-lime-400 font-bold font-mono text-xs" }, ex.name),
                      trackedSets.length === 0 
                        ? e("span", { class: "text-slate-600 text-[10px]" }, "No sets verified logged.")
                        : e("div", { class: "grid grid-cols-2 gap-x-4 gap-y-0.5 text-[11px] text-slate-400 mt-0.5" },
                            trackedSets.map((s, sIdx) => e("span", { key: sIdx }, `Set ${sIdx+1}: ${s.weight || "0"} lbs × ${s.reps}`))
                          )
                    );
                  })
            )
          );
        })
      );
    }

    // ─── MODULE TAB 3: TELEMETRY PERFORMANCE METRICS ───────────────────────
    function AnalyticsTab({ workoutLogs }) {
      // Parse performance state tracks
      const computeMaxes = () => {
        const maxes = {}; // key: exerciseName lowercased -> { maxWeight, date, repString, calcMax }
        
        workoutLogs.forEach(log => {
          const d = log.data;
          if (d && !d.isConditioning && d.exercises) {
            d.exercises.forEach(ex => {
              if (!ex.name) return;
              const nameKey = ex.name.trim();
              const validSets = ex.setsData?.filter(s => s.checked && s.weight) || [];
              
              validSets.forEach(set => {
                const w = parseFloat(set.weight);
                const r = parseInt(set.reps);
                if (isNaN(w) || isNaN(r) || r <= 0) return;
                
                // Brzycki empirical calculations formula for tracking estimates
                const estimatedMax = w * (36 / (37 - Math.min(r, 10)));
                
                if (!maxes[nameKey] || estimatedMax > maxes[nameKey].calcMax) {
                  maxes[nameKey] = {
                    cleanName: nameKey,
                    rawWeight: w,
                    rawReps: r,
                    calcMax: Math.round(estimatedMax),
                    date: log.date
                  };
                }
              });
            });
          }
        });
        
        return Object.values(maxes).sort((a, b) => b.calcMax - a.calcMax);
      };

      const highValueTrackRecords = computeMaxes();

      if (highValueTrackRecords.length === 0) {
        return e("div", { class: "text-center py-12 space-y-1 font-mono text-xs" },
          e("p", { class: "text-slate-500" }, "No verified set telemetry metrics parsed yet."),
          e("p", { class: "text-slate-600" }, "Verify structural checking rules during workouts to register tracking.")
        );
      }

      return e("div", { class: "space-y-4 pb-6" },
        e("div", null,
          e("h3", { class: "text-xs font-bold text-slate-400 tracking-wider uppercase font-mono" }, "Calculated Absolute Track Records"),
          e("p", { class: "text-[10px] text-slate-500 font-mono mt-0.5" }, "Estimated 1-Rep Max benchmarks computed via standard Brzycki load telemetry equations.")
        ),
        
        e("div", { class: "space-y-2" },
          highValueTrackRecords.map((rec, idx) => e("div", { key: idx, class: "bg-slate-900 border border-slate-800 rounded-xl p-3.5 font-mono text-xs flex justify-between items-center" },
            e("div", { class: "min-w-0 flex-1 pr-2" },
              e("div", { class: "text-slate-200 font-bold truncate text-sm tracking-tight" }, rec.cleanName),
              e("div", { class: "text-[10px] text-slate-500 mt-1 flex items-center gap-2" }, 
                e("span", null, `Best Set: ${rec.rawWeight} lbs × ${rec.rawReps}`),
                e("span", { class: "text-slate-700" }, "•"),
                e("span", null, rec.date)
              )
            ),
            e("div", { class: "text-right shrink-0 bg-slate-950 border border-slate-800 px-3 py-1.5 rounded-lg" },
              e("span", { class: "text-lime-400 font-bold text-md tracking-tight block" }, `${rec.calcMax}`),
              e("span", { class: "text-[9px] text-slate-500 font-bold uppercase tracking-widest block mt-0.5" }, "EST 1RM")
            )
          ))
        )
      );
    }

    // Mount execution engine frame bounds
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(e(App));
  </script>
</body>
</html>
